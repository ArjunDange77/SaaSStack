name: CI

on:
  workflow_call:
    secrets:
      VITE_API_BASE:
        description: Staging/production API URL for Vite build (cannot pass secrets via with)
        required: false
  pull_request:
    branches: [main, staging]
  push:
    branches:
      - "feature/**"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: saasstack
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas -d saasstack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: |
          ruff check config apps/registry/middleware.py apps/registry/logging_filters.py \
            apps/registry/storage.py apps/registry/tests/test_health.py config/health.py \
            apps/tenancy/middleware.py \
            apps/products/pg_management/views.py apps/products/pg_management/serializers.py \
            apps/products/pg_management/throttles.py apps/products/pg_management/validators.py \
            apps/products/school_bus/
      - name: Pytest
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "True"
          POSTGRES_DB: saasstack
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: changeme
          DB_HOST: localhost
          DB_PORT: "5432"
        run: pytest --cov-fail-under=70

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck and build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || 'http://localhost:8000' }}
        run: npm run build
      - run: npm run test:coverage
      - name: Upload frontend dist for deploy
        if: ${{ github.event_name == 'workflow_call' }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  docker-backend:
    if: ${{ github.event_name != 'workflow_call' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image (validate Dockerfile)
        run: |
          docker build \
            -f backend/Dockerfile \
            --build-arg APP_VERSION=${{ github.sha }} \
            -t saasstack-backend:ci \
            .
