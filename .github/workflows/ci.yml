name: CI

on:
  workflow_call:
    inputs:
      push_backend_image:
        description: Build and push backend image to GHCR (deploy pipelines)
        type: boolean
        default: false
    secrets:
      VITE_API_BASE:
        description: Staging/production API URL for Vite build (cannot pass secrets via with)
        required: false
  pull_request:
    branches: [main, staging]
  push:
    branches:
      - "feature/**"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: saasstack
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas -d saasstack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: |
          ruff check config apps/registry/middleware.py apps/registry/logging_filters.py \
            apps/registry/storage.py apps/registry/tests/test_health.py config/health.py \
            apps/tenancy/middleware.py \
            apps/products/pg_management/views.py apps/products/pg_management/serializers.py \
            apps/products/pg_management/throttles.py apps/products/pg_management/validators.py
      - name: Pytest
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: "True"
          POSTGRES_DB: saasstack
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: changeme
          DB_HOST: localhost
          DB_PORT: "5432"
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck and build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || 'http://localhost:8000' }}
        run: npm run build
      - run: npm run test:run
      - name: Upload frontend dist
        if: github.event_name == 'workflow_call' && inputs.push_backend_image
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  backend-image:
    if: github.event_name == 'workflow_call' && inputs.push_backend_image
    needs: backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
