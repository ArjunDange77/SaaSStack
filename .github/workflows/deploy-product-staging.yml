# Reusable staging deploy for a single SaaSStack product (PG, School Bus, future verticals).
name: Deploy Product Staging

on:
  workflow_call:
    inputs:
      product_label:
        required: true
        type: string
      environment_name:
        required: true
        type: string
      azure_resource_group:
        required: true
        type: string
      expected_env:
        required: true
        type: string
      frontend_deploy:
        required: true
        type: string
      deploy_slot:
        required: false
        type: string
        default: ""
      run_migrations:
        required: false
        type: boolean
        default: false
      run_pg_demo_seed:
        required: false
        type: boolean
        default: false
      run_sb_demo_seed:
        required: false
        type: boolean
        default: false
      seed_demo:
        required: false
        type: boolean
        default: false
      smoke_script:
        required: false
        type: string
        default: "smoke_test.sh"
    secrets:
      VITE_API_BASE:
        required: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run migrations
        if: inputs.run_migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.staging
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          pip install -r backend/requirements.txt
          bash deploy/scripts/migrate.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          slot-name: ${{ inputs.deploy_slot }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Seed pg-demo (manual)
        if: inputs.run_pg_demo_seed && inputs.seed_demo
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: bash deploy/scripts/seed_staging_demo.sh

      - name: Wait for API and early gate
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          EXPECTED_ENV: ${{ inputs.expected_env }}
          EXPECTED_VERSION: ${{ github.sha }}
        run: bash deploy/scripts/smoke_public_api.sh

      - name: Ensure pg-demo seed (PG)
        if: inputs.run_pg_demo_seed
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          AZURE_RESOURCE_GROUP: ${{ inputs.azure_resource_group }}
        run: bash deploy/scripts/ensure_staging_demo_seed.sh

      - name: Seed sb-demo (manual)
        if: inputs.run_sb_demo_seed && inputs.seed_demo
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          AZURE_RESOURCE_GROUP: ${{ inputs.azure_resource_group }}
        run: bash deploy/scripts/seed_staging_sb_demo.sh

      - name: Ensure sb-demo seed (School Bus)
        if: inputs.run_sb_demo_seed
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
          AZURE_RESOURCE_GROUP: ${{ inputs.azure_resource_group }}
          SB_SMOKE_USER: sb-operator
          SB_SMOKE_PASSWORD: admin
          SB_SMOKE_TENANT: sb-demo
        run: bash deploy/scripts/ensure_staging_sb_demo_seed.sh

      - uses: actions/download-artifact@v4
        id: frontend_artifact
        continue-on-error: true
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build frontend (fallback)
        if: steps.frontend_artifact.outcome != 'success'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm build frontend (fallback)
        if: steps.frontend_artifact.outcome != 'success'
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to Static Web Apps
        if: inputs.frontend_deploy == 'static_web_app'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true

      - name: Package frontend zip
        if: inputs.frontend_deploy == 'app_service_zip'
        run: |
          cd frontend/dist
          zip -r "$GITHUB_WORKSPACE/frontend-dist.zip" .

      - name: Deploy frontend to App Service
        if: inputs.frontend_deploy == 'app_service_zip'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_FRONTEND }}
          slot-name: ${{ inputs.deploy_slot }}
          package: frontend-dist.zip

      - name: Smoke tests
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          SMOKE_SWA_URL: ${{ secrets.SMOKE_SWA_URL }}
          SMOKE_WEB_URL: ${{ secrets.SMOKE_WEB_URL }}
          EXPECTED_ENV: ${{ inputs.expected_env }}
          EXPECTED_VERSION: ${{ github.sha }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_RESIDENT_USER: resident
          SMOKE_RESIDENT_PASSWORD: admin
        run: bash deploy/scripts/${{ inputs.smoke_script }}

      - name: Deployment summary
        run: |
          echo "## ${{ inputs.product_label }} staging" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- RG: \`${{ inputs.azure_resource_group }}\`" >> $GITHUB_STEP_SUMMARY
