name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}

      - name: Deploy backend to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for container startup (migrations run in entrypoint)
        run: sleep 90

      - name: Seed demo data (idempotent)
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          RG=rg-saasstack-staging
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings SEED_STAGING_DEMO=true \
            --output none
          az webapp restart --resource-group "$RG" --name "$AZURE_WEBAPP_NAME" --output none
          SEEDED=0
          for i in $(seq 1 36); do
            if curl -sf "${{ secrets.STAGING_API_URL }}/api/auth/login/" \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin"}' | grep -q access; then
              echo "Seed verified: admin login OK"
              SEEDED=1
              break
            fi
            echo "Waiting for seed (attempt $i/36)..."
            sleep 10
          done
          if [ "$SEEDED" != 1 ]; then
            echo "Seed failed: admin login not available after restart"
            exit 1
          fi
          az webapp config appsettings set \
            --resource-group "$RG" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings SEED_STAGING_DEMO=false \
            --output none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Pre-built Vite output only (skip_app_build ignores output_location)
          app_location: frontend/dist
          skip_app_build: true

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            BODY=$(curl -sf "${{ secrets.STAGING_API_URL }}/api/health/" || true)
            if echo "$BODY" | grep -q '"status": "ok"'; then
              echo "$BODY"
              echo "$BODY" | grep -q "\"version\": \"${{ github.sha }}\"" || exit 1
              echo "$BODY" | grep -q '"environment": "staging"' || exit 1
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Smoke tests
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          SMOKE_SWA_URL: ${{ secrets.SMOKE_SWA_URL }}
          EXPECTED_ENV: staging
          EXPECTED_VERSION: ${{ github.sha }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: bash deploy/scripts/smoke_test.sh

      - name: Deployment summary
        run: |
          echo "## Staging deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ secrets.STAGING_API_URL }}" >> $GITHUB_STEP_SUMMARY
