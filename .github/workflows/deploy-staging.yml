name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      seed_demo:
        description: Re-seed pg-demo demo data (restarts App Service, ~3–5 min)
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    permissions:
      contents: read
      actions: write

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (GHCR requires lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/backend" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Seed demo data (on demand)
        if: github.event_name == 'workflow_dispatch' && inputs.seed_demo == true
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
        run: bash deploy/scripts/seed_staging_demo.sh

      - name: Wait for API and early gate (health + public booking)
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          EXPECTED_ENV: staging
          EXPECTED_VERSION: ${{ github.sha }}
        run: bash deploy/scripts/smoke_public_api.sh

      - name: Download frontend dist from CI
        id: frontend_artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build frontend (fallback if artifact missing)
        if: steps.frontend_artifact.outcome != 'success'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm build frontend (fallback)
        if: steps.frontend_artifact.outcome != 'success'
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true

      - name: Smoke tests
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          SMOKE_SWA_URL: ${{ secrets.SMOKE_SWA_URL }}
          EXPECTED_ENV: staging
          EXPECTED_VERSION: ${{ github.sha }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          SMOKE_RESIDENT_USER: ${{ secrets.SMOKE_RESIDENT_USER }}
          SMOKE_RESIDENT_PASSWORD: ${{ secrets.SMOKE_RESIDENT_PASSWORD }}
        run: bash deploy/scripts/smoke_test.sh

      - name: Deployment summary
        run: |
          echo "## Staging deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.IMAGE_NAME }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ secrets.STAGING_API_URL }}" >> $GITHUB_STEP_SUMMARY
